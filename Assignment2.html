<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Random User Fetcher</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
    }

    h1 { color: #e94560; margin-bottom: 10px; }

    button {
      background: linear-gradient(90deg, #e94560, #533483);
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 1rem;
      border-radius: 50px;
      cursor: pointer;
      margin-bottom: 30px;
    }

    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      width: 360px;
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #e94560;
      margin-bottom: 12px;
    }

    .card h2 { margin-bottom: 6px; }

    .info { text-align: left; margin-top: 16px; }
    .info p { margin: 8px 0; font-size: 0.95rem; color: #ccc; }
    .info span { color: white; font-weight: bold; }
  </style>
</head>
<body>

  <h1>Random User Generator</h1>
  <button id="btn" onclick="fetchUser()">Get Random User</button>
  <div id="result"></div>

  <script>
    async function fetchUser() {
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');

      btn.disabled = true;
      btn.textContent = 'Loading...';
      result.innerHTML = '';

      try {
        const response = await fetch('https://randomuser.me/api/');

        if (!response.ok) throw new Error(`HTTP error: ${response.status}`);

        const data = await response.json();
        const user = data.results[0];

        const name    = `${user.name.first} ${user.name.last}`;
        const email   = user.email;
        const phone   = user.phone;
        const city    = user.location.city;
        const country = user.location.country;
        const picture = user.picture.large;

        result.innerHTML = `
          <div class="card">
            <img src="${picture}" alt="Profile" />
            <h2>${name}</h2>
            <div class="info">
              <p>Email:   <span>${email}</span></p>
              <p>Phone:   <span>${phone}</span></p>
              <p>City:    <span>${city}</span></p>
              <p>Country: <span>${country}</span></p>
            </div>
          </div>`;

      } catch (error) {
        result.innerHTML = `<p style="color:#ff6b6b;">Error: ${error.message}</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Get Another User';
      }
    }
  </script>

</body>
</html>
