<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Employee Data Fetcher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: white;
    }

    h1 { color: #e94560; font-size: 2rem; margin-bottom: 8px; }
    p.subtitle { color: #a0a0b0; margin-bottom: 30px; }

    button {
      background: linear-gradient(90deg, #e94560, #533483);
      color: white;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      border-radius: 50px;
      cursor: pointer;
      margin-bottom: 40px;
      transition: transform 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
    }

    button:hover { transform: translateY(-2px); opacity: 0.9; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #e94560;
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
      min-width: 130px;
    }

    .stat-card .number { font-size: 1.8rem; font-weight: bold; color: #e94560; }
    .stat-card .label  { font-size: 0.8rem; color: #a0a0b0; margin-top: 4px; }

    table {
      width: 100%;
      max-width: 950px;
      border-collapse: collapse;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    thead tr { background: linear-gradient(90deg, #e94560, #533483); }

    thead th {
      padding: 14px 18px;
      text-align: left;
      font-size: 0.85rem;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    tbody tr {
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s;
    }

    tbody tr:hover { background: rgba(233, 69, 96, 0.1); }

    tbody td { padding: 13px 18px; font-size: 0.92rem; color: #ddd; }

    .id-badge {
      background: rgba(233, 69, 96, 0.2);
      color: #e94560;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .email { color: #a8d8ff; }
    .company { color: #a8ff78; }
    .error { color: #ff6b6b; margin-top: 20px; font-size: 0.95rem; }
  </style>
</head>
<body>

  <h1>Employee Data Fetcher</h1>
  <p class="subtitle">Fetch live employee records from the REST API</p>

  <button id="btn" onclick="fetchEmployees()">Fetch Employees</button>

  <div id="result"></div>

  <script>
    const API_URL = 'https://jsonplaceholder.typicode.com/users';

    async function fetchEmployees() {
      const btn    = document.getElementById('btn');
      const result = document.getElementById('result');

      btn.disabled = true;
      btn.textContent = 'Fetching...';
      result.innerHTML = '<div class="spinner"></div>';

      try {
        const response = await fetch(API_URL);

        if (!response.ok) throw new Error(`HTTP Error! Status: ${response.status}`);

        const employees = await response.json();

        let html = `
          <div class="stats">
            <div class="stat-card">
              <div class="number">${employees.length}</div>
              <div class="label">Total Users</div>
            </div>
            <div class="stat-card">
              <div class="number">${employees.length}</div>
              <div class="label">Active Records</div>
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Company</th>
              </tr>
            </thead>
            <tbody>`;

        employees.forEach(e => {
          html += `
            <tr>
              <td><span class="id-badge">#${e.id}</span></td>
              <td>${e.name}</td>
              <td class="email">${e.email}</td>
              <td>${e.phone}</td>
              <td class="company">${e.company.name}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        result.innerHTML = html;

      } catch (error) {
        result.innerHTML = `<p class="error">Error: ${error.message}</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Refresh Data';
      }
    }
  </script>

</body>
</html>
